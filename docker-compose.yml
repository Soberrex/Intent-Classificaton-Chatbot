version: '3.8'

services:

  redis:
    image: redis:alpine
    container_name: redis-chatbot
    ports:
      - "6379:6379"
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: intent-api
    ports:
      - "8000:8000"
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    restart: unless-stopped

  streamlit:
    build:
      context: .
      dockerfile: docker/Dockerfile.streamlit
    container_name: intent-streamlit
    ports:
      - "8501:8501"
    depends_on:
      - api
    restart: unless-stopped